global
  log stdout format raw local0

defaults
  log global
  mode http
  option httplog
  timeout connect 2s
  timeout queue 5s
  timeout client 30s
  timeout server 30s
  timeout http-request 10s
  timeout http-keep-alive 10s
  timeout tunnel 1h

frontend lls_frontend
  bind *:6501
  # Cap HAProxy at 10 concurrent client connections across the sample stack.
  maxconn 10

  acl lls_ui path -i /
  acl lls_ui path_beg /ui

  use_backend lls_ui_backend if lls_ui
  default_backend lls_api_backend

resolvers docker
  parse-resolv-conf
  hold valid 10s

backend lls_api_backend
  option httpchk GET /health/ready
  http-check expect status 200
  default-server init-addr libc,none resolvers docker inter 2s fall 3 rise 2 check
  balance roundrobin
  server lls1 zentitle-lls-1:6501
  server lls2 zentitle-lls-2:6501
  server lls3 zentitle-lls-3:6501

backend lls_ui_backend
  option httpchk GET /health/ready
  http-check expect status 200
  default-server init-addr libc,none resolvers docker inter 2s fall 3 rise 2 check
  balance roundrobin
  # /ui is interactive server-side Blazor, so keep the circuit pinned to one node.
  # HAProxy tunnels upgraded WebSocket connections after the 101 response; timeout
  # tunnel in defaults keeps the Blazor Server connection alive when idle.
  cookie LLSUI insert indirect nocache httponly
  server lls1 zentitle-lls-1:6501 cookie lls1
  server lls2 zentitle-lls-2:6501 cookie lls2
  server lls3 zentitle-lls-3:6501 cookie lls3
